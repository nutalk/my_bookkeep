version: "3.8"

services:
  app:
    image: ${DOCKER_IMAGE:-nutalk/my-bookkeep}:latest
    restart: unless-stopped
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-family_balance_sheet}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      NEXT_PUBLIC_WECHAT_APP_ID: ${WECHAT_APP_ID:-}
    ports:
      - "${APP_PORT:-3000}:3000"
